<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julius Bett | Educator in Computer Studies & Mathematics | Web Developer</title>
    <meta name="description" content="Julius Bett – B.Ed Science (2:1 Honours, Nov 2025) | TSC-ready Senior Secondary Teacher (Computer Studies & Mathematics) | Full-Stack Web Developer crafting modern digital experiences.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #f59e0b;
            --text: #e2e8f0;
            --text-muted: #cbd5e1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(rgba(15,23,42,0.96), rgba(15,23,42,0.98)), url('m7.png') center/cover fixed;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        nav {
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(16px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(245,158,11,0.12);
            padding: 1.25rem 0;
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 54px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .brand { display: flex; align-items: center; gap: 1rem; }
        nav h1 {
            font-size: 1.9rem; font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav ul {
            display: flex; gap: 2.8rem; list-style: none; margin: 0;
            transition: all 0.4s ease;
        }
        nav a {
            color: var(--text-muted); text-decoration: none; font-weight: 500;
            position: relative; transition: color 0.3s;
        }
        nav a::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 2.5px;
            background: var(--accent); transition: width 0.35s ease;
        }
        nav a:hover { color: white; }
        nav a:hover::after { width: 100%; }
        .hamburger {
            display: none;
            font-size: 2.2rem;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1100;
            padding: 0.5rem;
        }

        /* Mobile menu */
        @media (max-width: 900px) {  /* ← changed from 768px to catch more phones */
            .hamburger { display: block; }
            nav ul {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--primary);
                flex-direction: column;
                padding: 2rem 0;
                display: none;
                border-bottom: 1px solid rgba(245,158,11,0.1);
                box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            }
            nav ul.active {
                display: flex;
            }
            nav ul a {
                padding: 1.2rem 2.5rem;
                font-size: 1.3rem;
                display: block;
            }
            .hero h1 { font-size: 3.6rem; }
            .degree { font-size: 1.9rem; }
            .hero p { font-size: 1.3rem; }
            .buttons { flex-direction: column; gap: 1.4rem; }
            .button { width: 100%; max-width: 380px; }
        }

        /* Rest of your styles remain unchanged */
        .hero { min-height: 92vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5rem 1rem 8rem; }
        .hero-content { max-width: 960px; animation: fadeUp 1.2s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .badge { display: inline-flex; align-items: center; gap: 0.6rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 0.7rem 1.5rem; border-radius: 999px; font-weight: 600; font-size: 1rem; margin-bottom: 1.5rem; box-shadow: 0 6px 20px rgba(245,158,11,0.35); }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4.2rem; font-weight: 800; margin: 0.8rem 0; line-height: 1.05; }
        .hero h1 span { color: var(--accent); }
        .degree { font-size: 2.1rem; margin: 1.2rem 0; color: var(--text-muted); font-weight: 500; }
        .hero p { font-size: 1.4rem; max-width: 780px; margin: 1.8rem auto; color: var(--text-muted); }
        .typed-text { color: var(--accent); font-weight: 700; }

        .buttons { display: flex; gap: 1.8rem; justify-content: center; flex-wrap: wrap; margin: 3rem 0 1rem; }
        .button { padding: 1rem 2.6rem; border-radius: 999px; font-weight: 600; font-size: 1.15rem; text-decoration: none; transition: all 0.4s cubic-bezier(0.22,1,0.36,1); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #d97706); color: white; }
        .btn-secondary { border: 2.5px solid var(--accent); color: white; }
        .button:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 14px 32px rgba(245,158,11,0.4); }
        .btn-secondary:hover { background: var(--accent); border-color: transparent; }

        .highlights { padding: 6rem 1rem 8rem; background: rgba(0,0,0,0.2); }
        .highlights h2 { text-align: center; font-size: 3rem; margin-bottom: 4rem; font-weight: 700; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .card { background: rgba(30,41,59,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(245,158,11,0.15); border-radius: 1.2rem; padding: 2.2rem; transition: all 0.4s; opacity: 0; transform: translateY(30px); }
        .card.visible { opacity: 1; transform: translateY(0); transition: all 0.8s ease; }
        .card h3 { font-size: 1.6rem; margin-bottom: 1rem; color: var(--accent); }
        .card p { color: var(--text-muted); }

        footer { background: rgba(15,23,42,0.98); padding: 3rem 1rem; text-align: center; border-top: 1px solid rgba(245,158,11,0.1); }
        .social-links a { color: var(--text-muted); font-size: 2rem; margin: 0 1.4rem; transition: all 0.3s; }
        .social-links a:hover { color: var(--accent); transform: translateY(-5px) scale(1.15); }

        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; transform: none !important; } }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <div class="brand">
                <img src="logo.png" alt="Julius Bett Profile" class="logo">
                <h1>Julius Bett</h1>
            </div>
            <button class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false"><i class="fas fa-bars"></i></button>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="skills.html">Skills & Projects</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- The rest of your HTML (hero, highlights, footer) remains exactly the same -->

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Typed.js
            new Typed('#typed', {
                strings: ['Computer Studies Teacher', 'Mathematics Educator', 'Full-Stack Developer', 'ICT in Education Advocate', 'Digital Creator'],
                typeSpeed: 80,
                backSpeed: 45,
                backDelay: 1800,
                loop: true,
                smartBackspace: true
            });

            // Hamburger menu – fixed version
            const hamburger = document.querySelector('.hamburger');
            const navUl = document.querySelector('nav ul');

            if (hamburger && navUl) {
                hamburger.addEventListener('click', function() {
                    navUl.classList.toggle('active');
                    const isExpanded = navUl.classList.contains('active');
                    hamburger.setAttribute('aria-expanded', isExpanded);
                    hamburger.innerHTML = isExpanded 
                        ? '<i class="fas fa-times"></i>' 
                        : '<i class="fas fa-bars"></i>';
                });
            }

            // Close menu when clicking a link
            document.querySelectorAll('nav ul a').forEach(link => {
                link.addEventListener('click', () => {
                    navUl.classList.remove('active');
                    hamburger.setAttribute('aria-expanded', 'false');
                    hamburger.innerHTML = '<i class="fas fa-bars"></i>';
                });
            });

            // Scroll reveal for cards
            const cards = document.querySelectorAll('.card');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });

            cards.forEach(card => observer.observe(card));
        });
    </script>
</body>
</html>
