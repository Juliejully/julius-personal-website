<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Julius Bett | Educator | Web Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* NAVBAR */

nav{
background:#0f172a;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

nav .container{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
}

.logo{
height:45px;
border-radius:50%;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

nav h1{
font-size:22px;
color:#f59e0b;
}

/* MENU */

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:#cbd5e1;
font-weight:500;
}

nav ul li a:hover{
color:white;
}

/* HAMBURGER */

.hamburger{
display:none;
font-size:28px;
background:none;
border:none;
color:white;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:20px;
}

.hero span{
color:#f59e0b;
}

.hero p{
font-size:18px;
max-width:600px;
margin:auto;
color:#cbd5e1;
}

/* MOBILE */

@media (max-width:768px){

.hamburger{
display:block;
}

/* hide menu */

nav ul{
display:none;
flex-direction:column;
position:absolute;
top:100%;
left:0;
width:100%;
background:#0f172a;
}

/* show menu */

nav ul.active{
display:flex;
}

nav ul li{
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
}

nav ul li a{
display:block;
padding:15px;
font-size:18px;
}

.hero h1{
font-size:30px;
}

}

</style>
</head>

<body>

<nav>

<div class="container">

<div class="brand">
<img src="logo.png" class="logo">
<h1>Julius Bett</h1>
</div>

<button class="hamburger">
<i class="fas fa-bars"></i>
</button>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Skills & Projects</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>

</ul>

</div>

</nav>

<section class="hero">

<h1>Hello I'm <span>Julius Bett</span></h1>

<p>
Senior Secondary Teacher in Computer Studies and Mathematics
and a passionate Web Developer.
</p>

</section>

<script>

/* HAMBURGER MENU */

const hamburger = document.querySelector(".hamburger");
const menu = document.querySelector("nav ul");

hamburger.addEventListener("click", function(){
menu.classList.toggle("active");
});

</script>

</body>
</html>
